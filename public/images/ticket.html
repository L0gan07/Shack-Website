<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="tickets.css">
    <link rel="stylesheet" href="index.css">
<link rel="icon" type="image/png" href="Shacklogo2.png">

    <title>Shack | Tickets</title>
</head>

<body>


<div class="content">

    <div class="topbar">

    <a href="index.html">
    <img class="shacklogo" src="Shacklogo2.png" alt="Shack Logo">
</a>
        <div class="buttons">
            <button onclick="window.location.href='index.html'" class="homebutton">Home</button>
            <button onclick="window.location.href='page1.html'" class="softwarebutton">Software</button>
            <button onclick="window.location.href='page2.html'" class="minecraftbutton">Pinnacle MC</button>
            <button onclick="window.location.href='page3.html'" class="teambutton">Team</button>
            <button onclick="window.location.href='ticket.html'" class="ticketbutton">Tickets</button>
        </div>

        <div class="sidebuttons">
            <button class="explorebutton">Explore</button>
            <a href="https://discord.gg/7FnMzcpvvU" target="_blank" class="supportbutton">Support</a>
        </div>

    </div>

    <!-- TICKET SYSTEM -->
    <div class="ticket-container">

        <h1>Contact Support</h1>

        <p class="subtitle">
            Need help? Submit a ticket and our team will respond by email.
        </p>

<form id="ticketForm">

    <input type="text" id="name" placeholder="Name" required>
    <input type="email" id="email" placeholder="Email" required>

    <input type="text" id="discord" placeholder="Discord (optional)">
    
    <select id="category">
        <option>General</option>
        <option>Bug</option>
        <option>Support</option>
    </select>

    <input type="text" id="subject" placeholder="Subject" required>

    <textarea id="description" placeholder="Describe your issue" required></textarea>

    <!-- IMAGE UPLOAD SECTION -->
    <label for="imageUpload" class="upload-box">
        📁 Click to upload image
        <span>PNG, JPG, or screenshot</span>
    </label>

    <input type="file" id="imageUpload" accept="image/*">

    <!-- IMAGE PREVIEW -->
    <img id="preview" class="image-preview">

    <!-- SUBMIT -->
    <button type="submit">Submit Ticket</button>

</form>
        <p id="responseMessage"></p>

    </div>

</div>

<script src="tickets.js"></script>

</body>
</html>

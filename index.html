<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sparks Home</title>
</head>
<body>
<div class="topbar">
    <img class="sparkslogo" src="sparkslogo.png">

    <div class="buttons">
        <button class="homebutton">Home</button>
        <button class="launcherbutton">Sparks Launcher</button>
        <button id="mc" class="minecraftbutton">Pinnacle MC</button>
        <button class="helpbutton">Help</button>
    </div>

    <div class="sidebuttons">
        <button class="explorebutton">Explore</button>
        <button class="supportbutton">Support</button>
    </div>
</div>

<div class="header">
    <p class="sparksheader">Efficiency, simplified.</p>
    <p class="Headertext">Sparks Development is a development team that creates all sorts of games and tools to power your next dream.</p>
    <div class="headerbuttons">
        <button class="explorebutton">Explore</button>
        <button class="supportbutton">Support</button>
</div>
<div class="image-scatter">
  <img src="Sparks Launcher.png" alt="Big Image" class="big-image">
  <img src="Hourglassicon.png" alt="Small Image 1" class="small-image left">
  <img src="rock.png" alt="Small Image 2" class="small-image right">
</div>
<div class="statistics">
    <div class="statistic">
        <p class="statistic-number">5+</p>
        <p class="statistic-label">Downloads</p>
    </div>
    <div class="statistic">
        <p class="statistic-number">10+</p>
        <p class="statistic-label">Projects</p>
    </div>
    <div class="statistic">
        <p class="statistic-number">100+</p>
        <p class="statistic-label">Happy Users</p>
    </div>
       <div class="statistic">
        <p class="statistic-number">30+</p>
        <p class="statistic-label">Staff/Developers</p>
    </div>
</div>
</body>
</html>
